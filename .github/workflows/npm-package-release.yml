name: npm Package Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "How to compute the next package version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Required only when version_bump is custom, for example 0.2.0-beta.1"
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      dry_run:
        description: "Run all checks and npm publish --dry-run without pushing a tag"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-package-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PACKAGE_NAME: "@nextop-os/agent-acp-kit"
      VERSION_BUMP: ${{ inputs.version_bump }}
      CUSTOM_VERSION: ${{ inputs.custom_version }}
      DIST_TAG: ${{ inputs.dist_tag }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure main branch release
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases must run from main, got ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        run: |
          if [ "${VERSION_BUMP}" = "custom" ]; then
            if [ -z "${CUSTOM_VERSION}" ]; then
              echo "custom_version is required when version_bump=custom."
              exit 1
            fi
            npm version "${CUSTOM_VERSION}" --no-git-tag-version --allow-same-version
          else
            npm version "${VERSION_BUMP}" --no-git-tag-version
          fi

          release_version="$(node -p "require('./package.json').version")"
          node -e 'const version = process.argv[1]; if (!/^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(version)) { console.error(`Invalid semver version: ${version}`); process.exit(1); }' "${release_version}"

          if npm view "${PACKAGE_NAME}@${release_version}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${release_version} is already published."
            exit 1
          fi

          printf 'release_version=%s\n' "${release_version}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${PACKAGE_NAME}@${release_version}"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate package tarball
        run: npm pack --dry-run

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            npm publish --access public --tag "${DIST_TAG}" --dry-run
          else
            npm publish --access public --tag "${DIST_TAG}" --provenance
          fi

      - name: Commit release version and tag
        if: ${{ inputs.dry_run != true }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release ${PACKAGE_NAME} v${RELEASE_VERSION}"
          git tag "v${RELEASE_VERSION}"
          git push origin "HEAD:main" --follow-tags
